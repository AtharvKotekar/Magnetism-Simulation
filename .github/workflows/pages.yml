name: Deploy GitHub Pages

# This repo deploys via branch-based GitHub Pages from the gh-pages branch
# (Settings → Pages → "Deploy from a branch": gh-pages). To deploy:
#   git push origin <branch>:gh-pages
# This Actions workflow only works if Pages is switched to "GitHub Actions"
# mode, so it is manual-only — otherwise it fails on every push while the
# branch deploy does the real work.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
